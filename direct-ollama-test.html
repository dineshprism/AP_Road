<!DOCTYPE html>
<html>
<head>
    <title>🚀 Direct Ollama Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background: #f5f5f5; }
        .container { max-width: 800px; margin: 0 auto; }
        .test-section { margin-bottom: 30px; padding: 20px; border: 1px solid #ddd; border-radius: 8px; background: white; }
        .button { padding: 12px 24px; margin: 8px; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; }
        .button-primary { background: #007bff; color: white; }
        .button-success { background: #28a745; color: white; }
        .button-warning { background: #ffc107; color: black; }
        .result { margin-top: 15px; padding: 20px; border-radius: 6px; }
        .success { background: #d4edda; color: #155724; border-left: 4px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border-left: 4px solid #f5c6cb; }
        .info { background: #d1ecf1; color: #0c5460; border-left: 4px solid #bee5eb; }
        .performance { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-top: 15px; }
        .metric { text-align: center; padding: 10px; border-radius: 4px; }
        .loading { color: #666; font-style: italic; }
        pre { background: #f8f9fa; padding: 15px; border-radius: 4px; overflow-x: auto; white-space: pre-wrap; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Direct Ollama RAG Test</h1>
        <p>Testing Ollama directly without authentication issues.</p>
        
        <div class="test-section">
            <h2>🦙 Standard Ollama Test</h2>
            <button class="button button-primary" onclick="testStandard()">Test Standard Analysis</button>
            <div id="standard-result" class="result"></div>
        </div>

        <div class="test-section">
            <h2>⚡ Optimized Ollama Test</h2>
            <button class="button button-success" onclick="testOptimized()">Test Optimized Analysis</button>
            <div id="optimized-result" class="result"></div>
        </div>

        <div class="test-section">
            <h2>⚡ Ultra-Optimized Test</h2>
            <button class="button button-warning" onclick="testUltra()">Test Ultra Analysis</button>
            <div id="ultra-result" class="result"></div>
        </div>

        <div class="performance">
            <h3>📊 Live Performance Comparison</h3>
            <div class="performance">
                <div class="metric">
                    <strong>Standard</strong><br>
                    <span id="standard-time" class="loading">--</span><br>
                    <span id="standard-status">Waiting...</span>
                </div>
                <div class="metric">
                    <strong>Optimized</strong><br>
                    <span id="optimized-time" class="loading">--</span><br>
                    <span id="optimized-status">Waiting...</span>
                </div>
                <div class="metric">
                    <strong>Ultra</strong><br>
                    <span id="ultra-time" class="loading">--</span><br>
                    <span id="ultra-status">Waiting...</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Test data
        const testData = {
            submission: {
                id: 'test-id',
                fir_number: 'DEMO/GT/2026/001',
                district: 'Guntur',
                place_of_accident: 'Tenali Railway Station Road Crossing',
                mandal: 'Tenali',
                police_station: 'Tenali',
                road_type: 'NH-16',
                accident_date: '2024-03-15',
                accident_time: '14:30',
                persons_died: 2,
                persons_injured: 3,
                vehicles: ['Car', 'Truck'],
                driver_related_causes: ['Overspeeding', 'Fatigue'],
                vehicle_condition_causes: ['Brake failure'],
                road_engineering_nature: ['Poor lighting'],
                road_engineering_junctions: ['No traffic signals'],
                road_engineering_signages: ['Missing warning signs'],
                road_engineering_median: ['Damaged median'],
                road_engineering_culverts: ['Blocked drainage']
            }
        };

        async function testStandard() {
            await testOllama('standard', 'standard-result', 'standard-time', 'standard-status', {
                temperature: 0.7,
                top_p: 0.9,
                max_tokens: 200,
                num_ctx: 2048
            });
        }

        async function testOptimized() {
            await testOllama('optimized', 'optimized-result', 'optimized-time', 'optimized-status', {
                temperature: 0.5,
                top_p: 0.95,
                max_tokens: 400,
                num_ctx: 1024,
                repeat_penalty: 1.1,
                num_predict: 256
            });
        }

        async function testUltra() {
            await testOllama('ultra', 'ultra-result', 'ultra-time', 'ultra-status', {
                temperature: 0.3,
                top_p: 0.95,
                max_tokens: 300,
                num_ctx: 1024,
                repeat_penalty: 1.2,
                num_predict: 200,
                mirostat: 1,
                seed: 42,
                stop: ['\n']
            });
        }

        async function testOllama(mode, resultId, timeId, statusId, options) {
            const resultDiv = document.getElementById(resultId);
            const timeSpan = document.getElementById(timeId);
            const statusSpan = document.getElementById(statusId);
            
            resultDiv.innerHTML = '<div class="info">🔄 Testing ' + mode + ' Ollama...</div>';
            resultDiv.className = 'result info';
            timeSpan.textContent = '--';
            statusSpan.textContent = 'Testing...';
            
            try {
                const startTime = Date.now();
                
                const prompt = createAccidentPrompt(testData.submission, mode);
                
                console.log('Testing ' + mode + ' Ollama with prompt:', prompt.substring(0, 200) + '...');
                
                const response = await fetch('http://localhost:11434/api/generate', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: 'phi3:mini',
                        prompt: prompt,
                        stream: false,
                        options: options
                    })
                });
                
                if (!response.ok) {
                    throw new Error('Ollama API error: ' + response.status);
                }
                
                const data = await response.json();
                const endTime = Date.now();
                const responseTime = ((endTime - startTime) / 1000).toFixed(2);
                
                console.log(mode + ' response received:', data.response?.substring(0, 200));
                console.log('Response time:', responseTime + 's');
                
                resultDiv.innerHTML = `
                    <div class="success">
                        <h4>✅ ${mode.charAt(0).toUpperCase() + ${mode.slice(1)} Working!</h4>
                        <div class="performance">
                            <div><strong>Response Time:</strong> ${responseTime}s</div>
                            <div><strong>Tokens Used:</strong> ${options.max_tokens}</div>
                            <div><strong>Temperature:</strong> ${options.temperature}</div>
                            <div><strong>Context:</strong> ${options.num_ctx}</div>
                        </div>
                        <pre>${data.response?.substring(0, 800) || 'No response'}</pre>
                    </div>
                `;
                resultDiv.className = 'result success';
                
                timeSpan.textContent = responseTime + 's';
                statusSpan.textContent = '✅ Success';
                
                // Update performance comparison
                updatePerformanceComparison();
                
            } catch (error) {
                console.error(mode + ' test error:', error);
                resultDiv.innerHTML = `
                    <div class="error">
                        <h4>❌ ${mode.charAt(0).toUpperCase() + ${mode.slice(1)} Failed</h4>
                        <p><strong>Error:</strong> ${error.message}</p>
                        <p><strong>Solution:</strong> Check if Ollama is running: <code>ollama serve</code></p>
                    </div>
                `;
                resultDiv.className = 'result error';
                
                timeSpan.textContent = '❌ Failed';
                statusSpan.textContent = '❌ Error';
            }
        }

        function createAccidentPrompt(submission, mode) {
            const context = `
ACCIDENT ANALYSIS REQUEST:
FIR: ${submission.fir_number}
LOCATION: ${submission.place_of_accident}, ${submission.mandal}, ${submission.district}
POLICE STATION: ${submission.police_station}
ROAD TYPE: ${submission.road_type}
DATE/TIME: ${submission.accident_date} at ${submission.accident_time}
CASUALTIES: ${submission.persons_died} died, ${submission.persons_injured} injured
VEHICLES: ${submission.vehicles.join(', ')}
DRIVER CAUSES: ${submission.driver_related_causes.join(', ')}
VEHICLE ISSUES: ${submission.vehicle_condition_causes.join(', ')}
ROAD ISSUES: ${submission.road_engineering_nature.join(', ')}

${mode === 'ultra' ? `
ULTRA-OPTIMIZED ANALYSIS FOCUS:
1. Primary cause identification (fast)
2. Contributing factors (concise)
3. Preventive measures (actionable)
4. Infrastructure recommendations (specific)
5. Safety improvement suggestions (practical)

Provide concise, actionable analysis focused on accident prevention and safety improvements.
` : `
ANALYSIS FOCUS:
1. Root cause identification
2. Contributing factors
3. Preventive measures
4. Infrastructure recommendations
5. Safety improvement suggestions

Be thorough but concise. Provide practical recommendations that can be implemented.
`}

You are an expert traffic accident analyst for Andhra Pradesh Police. 
Analyze the provided accident data and provide specific, actionable insights.
Focus on:
- Primary causes and contributing factors
- Preventive measures for similar accidents
- Infrastructure improvements needed
- Safety recommendations for the location
- Investigation suggestions

Be thorough but concise. Provide practical recommendations that can be implemented.

Question: What were the main causes of this traffic accident and what preventive measures would you recommend to avoid similar incidents in the future?
`;
            return context;
        }

        function updatePerformanceComparison() {
            // This would be updated with actual test results
            console.log('Performance comparison updated');
        }

        // Initialize
        console.log('🚀 Direct Ollama Test Ready');
        console.log('Available models:', ['phi3:mini', 'llama3.1:8b']);
        console.log('Test modes:', ['standard', 'optimized', 'ultra']);
    </script>
</body>
</html>
